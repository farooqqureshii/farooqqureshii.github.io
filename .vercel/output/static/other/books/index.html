  const setTheme = () => {
    let theme;

    if (typeof localStorage !== "undefined" && localStorage.getItem("theme")) {
      theme = localStorage.getItem("theme");
    } else {
      // Default to light theme instead of system preference for consistency
      theme = "light";
    }

    // Apply the theme
    const html = document.documentElement;
    
    // Remove all theme classes first
    html.classList.remove("dark", "flexoki");
    
    // Add the appropriate theme class
    if (theme === "dark") {
      html.classList.add("dark");
    } else if (theme === "flexoki") {
      html.classList.add("flexoki");
    }
    // If theme is "light" or anything else, no class is added (default light theme)

    if (typeof localStorage !== "undefined") {
      // Only observe theme changes on user interaction, not automatically
      const observer = new MutationObserver(() => {
        const isDark = html.classList.contains("dark");
        const isFlexoki = html.classList.contains("flexoki");
        
        let currentTheme = "light";
        if (isDark) currentTheme = "dark";
        else if (isFlexoki) currentTheme = "flexoki";
        
        localStorage.setItem("theme", currentTheme);
      });
      observer.observe(html, {
        attributes: true,
        attributeFilter: ["class"],
      });
    }
  };

  setTheme();
  
  // Initialize serif font mode
  const initSerifMode = () => {
    const html = document.documentElement;
    const serifEnabled = localStorage.getItem('serif-mode') === 'true';
    
    if (serifEnabled) {
      html.classList.add('serif-mode');
      // Load Newsreader (serif) from Fontshare when serif mode is enabled
      if (!document.getElementById('serif-font')) {
        const link = document.createElement('link');
        link.id = 'serif-font';
        link.rel = 'stylesheet';
        link.href = 'https://api.fontshare.com/v2/css?f[]=newsreader@200,300,400,500,600,700&display=swap';
        document.head.appendChild(link);
      }
    } else {
      html.classList.remove('serif-mode');
    }
  };
  
  initSerifMode();
  
  // Only re-run theme on navigation if needed (defer to not block)
  if (typeof document !== 'undefined' && 'astro' in window) {
    document.addEventListener("astro:after-swap", () => {
      requestIdleCallback ? requestIdleCallback(setTheme) : setTimeout(setTheme, 0);
      initSerifMode();
    });
  }
